name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Skip the Vite build everywhere except the release-build job. The Rust
  # crate compiles fine without a populated `$OUT_DIR/ui/dist/`; build.rs
  # leaves an empty dist/ when this is set so rust-embed still resolves.
  MEZAME_SKIP_UI_BUILD: "1"

jobs:
  test:
    name: Test (${{ matrix.os }} / ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Mezame is Unix-only: src/unix.rs uses `kill` and `setsid` via
        # FFI, gated on `#[cfg(unix)]`. Windows compiles but the runtime
        # is degraded (pid_is_alive always returns true, no process
        # group). We do not ship Windows binaries, so we do not test
        # Windows in CI.
        include:
          - os: ubuntu-latest
            rust: stable
          - os: macos-latest
            rust: stable
          - os: ubuntu-latest
            rust: beta

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Lint with clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all-targets --verbose

  ui-tests:
    name: UI tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI deps
        run: npm ci
        working-directory: ui

      - name: Link node_modules into tests/ui
        # Vite's bare-import resolver only walks parent directories from
        # the importing file. Tests live at tests/ui/ which is outside
        # the ui/ package, so we expose the package's node_modules via
        # a symlink. Same treatment as the local pre-commit hook.
        run: ln -s ../../ui/node_modules tests/ui/node_modules

      - name: Run Vitest
        run: npm test
        working-directory: ui

  # Separate job to verify the full release build, including the UI
  # bundle. Slower than the test matrix because it runs the Vite build,
  # so we only do it on Linux.
  release-build:
    name: Release build with UI
    runs-on: ubuntu-latest
    env:
      MEZAME_SKIP_UI_BUILD: ""
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --verbose

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      - name: Run tests with coverage
        # Threshold is intentionally modest: ws.rs::handle_ws and the
        # config interactive setup are not covered. Lift this as new
        # tests land. Tracking trend over time is more useful than a
        # tight gate on a young suite.
        run: cargo tarpaulin --out Xml --out Stdout --fail-under 35

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./cobertura.xml
          flags: rust
          name: codecov-rust

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Security audit
        run: cargo audit

  msrv:
    name: Minimum Supported Rust Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust 1.86
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0

      - uses: Swatinem/rust-cache@v2

      - name: Check MSRV
        run: cargo check --all-targets
